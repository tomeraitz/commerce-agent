services:
  server:
    build:
      context: ./server
    image: bazak-server:latest
    container_name: bazak-server
    env_file:
      - ./server/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        # Empty => the client uses same-origin relative URLs (e.g. /chat),
        # which nginx proxies to the server container over the internal network.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    image: bazak-client:latest
    container_name: bazak-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

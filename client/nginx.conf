server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Chrome often carries many cookies on localhost from unrelated dev apps,
    # which can overflow nginx's default 8k header buffer and trigger
    # "400 Bad Request — Request Header Or Cookie Too Large".
    large_client_header_buffers 8 32k;
    client_header_buffer_size 32k;

    # Proxy API calls to the server container over the internal Docker network.
    # The browser hits same-origin /chat, avoiding CORS and letting the client
    # work without knowing the server's URL.
    location = /chat {
        proxy_pass http://server:8000/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Match the client's 25 s timeout budget.
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /health {
        proxy_pass http://server:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Long-cache hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths return index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
